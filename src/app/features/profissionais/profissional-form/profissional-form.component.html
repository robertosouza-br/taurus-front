<div class="form-container">
  <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

  <app-page-header
    [title]="modoEdicao ? 'Editar Profissional' : 'Novo Profissional'"
    subtitle="Cadastre os dados mestres do profissional e seus vínculos com imobiliárias"
    icon="pi pi-user-edit">
  </app-page-header>

  <app-loading-spinner
    *ngIf="carregando"
    [overlay]="true"
    message="Carregando profissional...">
  </app-loading-spinner>

  <div class="profissional-form" *ngIf="!carregando">
    <p-card header="Dados do Profissional">
      <div class="grid">
        <div class="col-12 md:col-6">
          <app-input-text
            id="nomeProfissional"
            label="Nome"
            [(ngModel)]="nome"
            [required]="true"
            [showValidation]="tentouSalvar">
          </app-input-text>
        </div>

        <div class="col-12 md:col-6">
          <app-input-text
            id="nomeGuerraProfissional"
            label="Nome de Guerra"
            [(ngModel)]="nomeGuerra"
            [showValidation]="tentouSalvar">
          </app-input-text>
        </div>

        <div class="col-12 md:col-4">
          <app-input-cpf
            id="cpfProfissional"
            label="CPF"
            [(ngModel)]="cpf"
            [showValidation]="tentouSalvar">
          </app-input-cpf>
        </div>

        <div class="col-12 md:col-4">
          <app-input-telefone
            id="telefoneProfissional"
            label="Telefone"
            [(ngModel)]="telefone"
            [required]="true"
            [showValidation]="tentouSalvar"
            placeholder="(00) 00000-0000">
          </app-input-telefone>
        </div>

        <div class="col-12 md:col-4">
          <app-input-text
            id="emailProfissional"
            label="E-mail"
            type="email"
            [(ngModel)]="email"
            [showValidation]="tentouSalvar">
          </app-input-text>
        </div>

        <div class="col-12 md:col-4">
          <app-input-text
            id="creciProfissional"
            label="CRECI"
            [(ngModel)]="numeroCreci"
            [showValidation]="tentouSalvar">
          </app-input-text>
        </div>
      </div>
    </p-card>

    <p-card *ngIf="modoEdicao" header="Vínculos com Imobiliárias" styleClass="mt-3">
      <div class="grid">
        <div class="col-12 md:col-6">
          <app-multi-select
            id="imobiliariasProfissional"
            label="Imobiliárias"
            [(ngModel)]="imobiliariaIds"
            [options]="imobiliariaOptions"
            optionLabel="label"
            optionValue="value"
            [disabled]="true"
            [showValidation]="tentouSalvar"
            [filter]="true">
          </app-multi-select>
        </div>
      </div>

    </p-card>

    <div class="form-actions">
      <app-custom-button
        label="Cancelar"
        icon="pi pi-times"
        severity="warning"
        (onClick)="cancelar()"
        [disabled]="salvando">
      </app-custom-button>

      <app-custom-button
        label="Limpar"
        icon="pi pi-refresh"
        severity="secondary"
        [outlined]="true"
        (onClick)="limpar()"
        [disabled]="salvando">
      </app-custom-button>

      <app-custom-button
        [label]="modoEdicao ? 'Salvar Alterações' : 'Criar Profissional'"
        icon="pi pi-save"
        severity="success"
        actionType="save"
        (onClick)="salvar()"
        [loading]="salvando">
      </app-custom-button>
    </div>
  </div>
</div>
