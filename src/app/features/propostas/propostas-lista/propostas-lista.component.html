<div class="lista-container">
  <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

  <app-page-header
    title="Reservas para Proposta"
    subtitle="Reservas disponíveis para iniciar ou continuar propostas"
    icon="pi pi-file-edit">
    <div class="acoes-header">
      <app-export-speed-dial
        [loading]="exportando"
        (onExport)="exportar()">
      </app-export-speed-dial>
    </div>
  </app-page-header>

  <app-data-table
    [data]="reservas"
    [columns]="colunas"
    [actions]="acoes"
    [totalRecords]="totalRegistros"
    [loading]="carregando"
    [lazy]="true"
    [rows]="itensPorPagina"
    [rowsPerPageOptions]="[10, 20, 50]"
    emptyMessage="Nenhuma reserva encontrada para proposta"
    (onLazyLoad)="onLazyLoad($event)"
    (onSearch)="onBuscar($event)">

    <ng-template appTableTemplate="cpfCnpj" let-reserva="rowData">
      <span *ngIf="reserva.cpfCnpjCliente; else semCpfCnpj">
        {{ formatarCpfCnpj(reserva.cpfCnpjCliente) }}
      </span>
      <ng-template #semCpfCnpj>
        <span class="text-color-secondary">-</span>
      </ng-template>
    </ng-template>

    <ng-template appTableTemplate="status" let-reserva="rowData">
      <p-tag
        [value]="reserva.statusProposta || '-'"
        [severity]="getStatusSeverity(reserva.statusProposta || '')">
      </p-tag>
    </ng-template>

    <ng-template appTableTemplate="dataReserva" let-reserva="rowData">
      <span *ngIf="reserva.dataReserva; else semData">
        {{ reserva.dataReserva | date:'dd/MM/yyyy' }}
      </span>
      <ng-template #semData>
        <span class="text-color-secondary">-</span>
      </ng-template>
    </ng-template>
  </app-data-table>
</div>
