<div class="page-header" [class.gradient]="gradient" [class.no-divider]="!showDivider">
  <ng-container *ngIf="customTemplate; else defaultHeader">
    <ng-container *ngTemplateOutlet="customTemplate"></ng-container>
  </ng-container>
  
  <ng-template #defaultHeader>
    <div class="header-content">
      <div class="title-section">
        <i *ngIf="icon" [class]="icon + ' header-icon'"></i>
        <div class="text-content">
          <div class="title-row">
            <h1>{{ title }}</h1>
            <ng-content select="[pageHeaderExtra]"></ng-content>
          </div>
          <p *ngIf="subtitle" class="subtitle">{{ subtitle }}</p>
        </div>
      </div>

      <div class="actions-section" *ngIf="actions.length > 0">
        <app-custom-button
          *ngFor="let action of actions"
          [label]="action.label"
          [icon]="action.icon"
          [severity]="action.severity || 'primary'"
          [outlined]="action.outlined || false"
          [rounded]="action.rounded || false"
          [text]="action.text || false"
          [disabled]="isActionDisabled(action)"
          [loading]="isActionLoading(action)"
          [raised]="action.raised ?? true"
          [size]="action.size || 'normal'"
          [tooltip]="action.tooltip || ''"
          [tooltipPosition]="action.tooltipPosition || 'top'"
          [styleClass]="action.styleClass || ''"
          [style.display]="isActionVisible(action) ? 'inline-flex' : 'none'"
          (onClick)="executeAction(action)">
        </app-custom-button>
      </div>
    </div>
  </ng-template>
</div>
